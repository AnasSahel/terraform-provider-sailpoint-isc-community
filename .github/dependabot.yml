# See GitHub's documentation for more information on this file:
# https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates
version: 2
updates:
  # Maintain dependencies for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      # Check for updates to Go modules every weekday
      interval: "daily"
    groups:
      # Group all terraform-plugin-(go|sdk|framework|testing) dependencies together
      "terraform-plugin":
        patterns:
          - "github.com/hashicorp/terraform-plugin-*"
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "daily"
    ignore:
      # terraform-plugin-docs 0.25.0 raised its minimum Go to 1.25.8, which
      # exceeds our `go.mod` baseline (and the HashiCorp scaffolding template's
      # baseline). `tools/go.mod` must stay <= the main `go.mod`, so we skip
      # minor/major bumps of this package until we are ready to bump Go
      # globally. Patch bumps within the current minor remain allowed.
      - dependency-name: "github.com/hashicorp/terraform-plugin-docs"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      "github-actions":
        patterns:
          - "*" # Group all GitHub Actions dependencies together
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
